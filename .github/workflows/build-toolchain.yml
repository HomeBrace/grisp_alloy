name: Build Toolchain

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: true
        default: 'phyboard-pollux-imx8mp'
        type: choice
        options:
          - phyboard-pollux-imx8mp

jobs:
  build-toolchain:
    name: Build Toolchain
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev \
            pv git bzr cvs mercurial subversion unzip bc \
            bison flex gperf texinfo help2man \
            libssl-dev gawk libtool-bin automake lzip python3 mtools \
            u-boot-tools git-lfs keyutils qemu-user qemu-user-static \
            gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu \
            cpio wget

      - name: Build toolchain
        run: ./build-toolchain.sh ${{ github.event.inputs.target }}

      - name: Identify toolchain artefact
        id: artefact
        run: |
          TOOLCHAIN_FILE=$(ls artefacts/grisp_toolchain_aarch64_unknown_linux_gnu-*.tar.xz)
          TOOLCHAIN_NAME=$(basename "$TOOLCHAIN_FILE")
          # Extract version: grisp_toolchain_aarch64_unknown_linux_gnu-1.1.linux-x86_64.tar.xz -> 1.1
          TOOLCHAIN_VER=$(echo "$TOOLCHAIN_NAME" | sed 's/grisp_toolchain_aarch64_unknown_linux_gnu-\([^.]*\.[^.]*\)\..*/\1/')
          echo "file=${TOOLCHAIN_FILE}" >> "$GITHUB_OUTPUT"
          echo "version=${TOOLCHAIN_VER}" >> "$GITHUB_OUTPUT"
          echo "Toolchain: ${TOOLCHAIN_NAME} (version ${TOOLCHAIN_VER})"
          ls -lh "$TOOLCHAIN_FILE"

      - name: Create release
        run: |
          TAG="toolchain-v${{ steps.artefact.outputs.version }}"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "Toolchain: aarch64 v${{ steps.artefact.outputs.version }}" \
            --notes "Cross-compilation toolchain for aarch64 targets ($(uname -m))." \
            "${{ steps.artefact.outputs.file }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
